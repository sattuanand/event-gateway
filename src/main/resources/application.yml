spring:
  application:
    name: event-gateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eventledger}
    username: ${DB_USERNAME:eventledger}
    password: ${DB_PASSWORD:eventledger}
    hikari:
      pool-name: gateway-pool
      maximum-pool-size: 10
      connection-timeout: 3000

  jpa:
    # Flyway owns the schema. Hibernate must never touch DDL.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

account-service:
  base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
  # Short and deliberate. A circuit breaker cannot save you from a downstream that is slow rather
  # than dead: with no read timeout, request threads park on sockets and the breaker never sees a
  # failure to count.
  connect-timeout: 1s
  read-timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      # Sample everything. This is a take-home, not a system under production load.
      probability: 1.0

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException
        # A 4xx means the downstream is healthy and WE are wrong. Counting it would let a bad client
        # payload trip the breaker for every other caller.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException

  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # Jitter: without it, every caller retries in lockstep and stampedes the recovering service.
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          # Retry sits OUTSIDE the breaker in Resilience4j's default aspect order. Without this, an
          # open circuit would still burn 3 attempts before failing — defeating the whole point of
          # failing fast.
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - org.springframework.web.client.HttpClientErrorException

logging:
  level:
    root: INFO
    com.eventledger: INFO
