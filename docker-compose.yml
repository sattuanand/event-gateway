services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eventledger
      POSTGRES_USER: eventledger
      POSTGRES_PASSWORD: eventledger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventledger -d eventledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/eventledger
      DB_USERNAME: eventledger
      DB_PASSWORD: eventledger
    depends_on:
      postgres:
        condition: service_healthy
